# Generates library docs with Dokka and deploys it to devlog-kotlin.hermannm.dev
name: Deploy documentation
on:
  # Trigger release when a new semantic version tag (vX.Y.Z) is pushed
  push:
    tags:
      - v[0-9]+\.[0-9]+\.[0-9]+
  # Allow deployment to be triggered manually
  workflow_dispatch:
    inputs:
      ref_to_deploy:
        description: >-
          Tag / commit / branch name to use for the manual deploy. Defaults to latest commit on the
          chosen branch if not provided.
        required: false
        type: string
env:
  FORCE_COLOR: 1
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      # https://github.com/actions/checkout/releases
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref_to_deploy || github.ref }}

      - name: Build docs
        run: ./gradlew :dokkaGeneratePublicationHtml

      # https://github.com/actions/upload-pages-artifact/releases
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./build/dokka/html

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      # https://github.com/actions/deploy-pages/releases
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

    environment:
      name: devlog-kotlin.hermannm.dev
      url: ${{ steps.deploy.outputs.page_url }}
